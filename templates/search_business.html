{% extends "base.html" %}
{% block content %}
<h1>Search Business</h1>
<form method="get">
  <input type="text" name="q" placeholder="Search businesses..." value="{{ query }}">
  <button type="submit">Search</button>
</form>
<div class="search-container">
  <ul>
    {% for item in products %}
      <li>{{ item.name }}</li>
      <a href="{% url 'add_offer_jobs' business_id=item.id %}">
        <button type="button">Dodaj ofertę pracy</button>
    </a>
    {% empty %}
      <li>No businesses or tags found.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
