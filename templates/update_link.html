{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <h2>Edytuj link</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Zaktualizuj link</button>
        <a href="{% url 'cv-detail' user_pk=request.user.pk %}" class="btn btn-secondary">Anuluj</a>
    </form>
</div>
{% endblock %}
