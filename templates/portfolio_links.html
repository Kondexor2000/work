{% extends "base.html" %}
{% block content %}
<h1>Linki do projektów</h1>
<h2>{{ products.portfolio.title }}</h2>
<ul>
    {% for link in products %}
      <li><a href="{{ link.url }}">{{ link.url }}</a>
        <h1>{{ link.title }}</h1>
        <p>{{ link.description }}</p>
      </li>
    {% endfor %}
</ul>
{% endblock %}
