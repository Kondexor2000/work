{% extends "base.html" %}
{% block content %}
<h1>Linki do projektów</h1>
<h2>{{ products.test.title }}</h2>
<ul>
  {% for link in products %}
    <li><a href="{{ link.url }}">{{ link.question }}</a></li>
    <a href="{% url 'update_question' test_id=link.test.id question_id=link.id %}">Edytuj pytanie</a>
    <a href="{% url 'delete_question' test_id=link.test.id question_id=link.id %}">Usuń pytanie</a>
  {% endfor %}
</ul>
{% endblock %}
