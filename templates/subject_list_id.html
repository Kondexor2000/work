{% extends "base.html" %}

{% block content %}
<ul>
  <li>
    <strong>{{ products.title }}</strong>
    <p>{{ products.description }}</p>

    {% if products.file %}
      <img src="{{ products.file.url }}" alt="{{ products.title }}" style="max-width: 300px;" />
    {% endif %}
  </li>
</ul>
{% endblock %}
