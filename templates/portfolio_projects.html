{% extends "base.html" %}

{% block content %}
<h1>Portfolio Projects</h1>
<ul>
  {% for project in products %}
    <li>
      <img src="{{ project.file.url }}" alt="{{ project.name }}">
      <a href="{% url 'update_project' portfolio_id=project.portfolio.id project_id=project.id %}">
          <button type="button">Usuń projekt</button>
        </a>
    </li>
  {% endfor %}
</ul>
{% endblock %}
