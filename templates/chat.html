<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>AI Eduwork</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        #chat-container {
            width: 600px;
            margin: auto;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            text-align: right;
            margin: 5px;
        }

        .ai {
            text-align: left;
            margin: 5px;
        }

        .bubble {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user .bubble {
            background: #007bff;
            color: white;
        }

        .ai .bubble {
            background: #e4e6eb;
        }

        #input-area {
            display: flex;
        }

        #question {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>AI Eduwork 🤖</h2>

    <div id="chat-box"></div>

    <div id="input-area">
        <input type="text" id="question" placeholder="Zadaj pytanie...">
        <button onclick="sendMessage()">Wyślij</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("question");
    const chatBox = document.getElementById("chat-box");

    const question = input.value.trim();
    if (!question) return;

    // 🔹 pokaż pytanie użytkownika
    chatBox.innerHTML += `
        <div class="user">
            <div class="bubble">${question}</div>
        </div>
    `;

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    // 🔹 placeholder "pisania"
    const typingId = "typing-" + Date.now();
    chatBox.innerHTML += `
        <div class="ai" id="${typingId}">
            <div class="bubble">...</div>
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("/ai/chat/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        });

        const data = await response.json();

        // 🔹 usuń "..."
        document.getElementById(typingId).remove();

        // 🔹 pokaż odpowiedź AI
        chatBox.innerHTML += `
            <div class="ai">
                <div class="bubble">${data.answer}</div>
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        document.getElementById(typingId).remove();

        chatBox.innerHTML += `
            <div class="ai">
                <div class="bubble">Błąd połączenia z serwerem</div>
            </div>
        `;
    }
}

// 🔥 Enter = wysyłanie
document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
