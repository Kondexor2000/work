{% extends "base.html" %}
{% block content %}
<h1>Search Courses</h1>
<form method="get">
  <input type="text" name="q" placeholder="Search courses..." value="{{ query }}">
  <button type="submit">Search</button>
</form>
<h2>Courses</h2>
<ul>
  {% for course in courses %}
    <li>{{ course.title }}</li>
  {% endfor %}
</ul>
<h2>Tags</h2>
<ul>
  {% for tag in tags %}
    <li>{{ tag.name }}</li>
  {% endfor %}
</ul>
{% endblock %}
