{% extends "base.html" %}
{% block content %}
<h1>Items</h1>
<ul>
  {% for item in products %}
    <li>{{ item }}</li>
    {% if item.subject.course.author = request.user %}
      <a href="{% url 'test_to_questions_view' test_id=item.id %}">Pytania</a>
      <a href="{% url 'update_test' test_id=item.id %}">
          <button type="button">Edytuj test</button>
      </a>
      <a href="{% url 'delete_test' test_id=item.id %}">
          <button type="button">Usuń test</button>
      </a>
    {% else %}
      <a href="{% url 'answer_question' test_id=item.id %}">Wypełnij test</a>
      <a href="{% url 'test_to_questions_view' test_id=item.id %}">Pytania</a>
    {% endif %}
  {% empty %}
    <li>No items found.</li>
  {% endfor %}
</ul>
{% endblock %}
