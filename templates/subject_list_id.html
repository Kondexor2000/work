{% extends "base.html" %}

{% block content %}
<ul>
  {% for item in products %}
    <li>
      <strong>{{ item.title }}</strong>
      <p>{{ item.description }}</p>

      {% if item.file %}
        <img src="{{ item.file.url }}" alt="{{ item.title }}" style="max-width: 300px;" />
      {% endif %}
    </li>
  {% empty %}
    <li>No items found.</li>
  {% endfor %}
</ul>
{% endblock %}
