{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <h2>Twoje CV</h2>

    {% if products %}
        <div class="row mt-4">
            {% for cv in products %}
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">{{ cv.title }}</h5>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% elif not products %}
        <div class="alert alert-info mt-4">
            Nie masz jeszcze żadnego CV.
        </div>
    {% endif %}

</div>
{% endblock %}
