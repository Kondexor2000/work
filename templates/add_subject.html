{% extends 'base.html' %}
{% block content %}
<h2>Dodaj przedmiot</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ formset.management_form }}
    <div id="formset">
        {% for form in formset %}
            <div class="question-form">
                {{ form.as_p }}
            </div>
        {% endfor %}
    </div>
    <button type="button" id="add-more">Dodaj kolejny przedmiot</button>
    <button type="submit">Zapisz przedmiot</button>
</form>

Zapisane tematy? <a href="{% url 'subject_to_course_view' course_id=course_id %}">
        <button type="button">Otwórz kurs</button>
    </a>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const addButton = document.getElementById('add-more');
    const formContainer = document.getElementById('formset');
    const totalForms = document.getElementById('id_form-TOTAL_FORMS');

    addButton.addEventListener('click', function () {
        const formCount = parseInt(totalForms.value);
        const emptyForm = formContainer.children[0].cloneNode(true);

        emptyForm.querySelectorAll('input, textarea, select').forEach(el => {
            if (el.type === 'checkbox' || el.type === 'radio') {
                el.checked = false;
            } else {
                el.value = '';
            }
        });

        emptyForm.querySelectorAll('[name]').forEach(el => {
            el.name = el.name.replace(/-\d+-/, `-${formCount}-`);
        });

        emptyForm.querySelectorAll('[id]').forEach(el => {
            el.id = el.id.replace(/-\d+-/, `-${formCount}-`);
        });

        formContainer.appendChild(emptyForm);
        totalForms.value = formCount + 1;
    });
});
</script>
{% endblock %}
