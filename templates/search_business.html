{% extends "base.html" %}
{% block content %}
<h1>Search Business</h1>
<form method="get">
  <input type="text" name="q" placeholder="Search businesses..." value="{{ query }}">
  <button type="submit">Search</button>
</form>
<ul>
  {% for item in products %}
    <li>{{ item.title }}</li>
    <a href="{% url 'read_offer_jobs' business_id=item.business.id hr_id=item.hr.id %}">
        <button type="button">Szczegóły</button>
    </a>
  {% empty %}
    <li>No businesses or tags found.</li>
  {% endfor %}
</ul>
{% endblock %}
