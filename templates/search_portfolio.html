{% extends "base.html" %}
{% block content %}
<h1>Search Portfolios</h1>
<form method="get">
  <input type="text" name="q" value="{{ query }}" placeholder="Search...">
  <button type="submit">Search</button>
</form>
<h2>Portfolios</h2>
<ul>
  {% for item in portfolios %}
    <li>
      {{ item.title }}
      <a href="{% url 'portfolio_projects_view' portfolio_id=item.id %}">
        <button type="button">Projects</button>
      </a>
      <a href="{% url 'portfolio_links_view' portfolio_id=item.id %}">
        <button type="button">Links</button>
      </a>
    </li>
  {% endfor %}
</ul>
<h2>Tags</h2>
<ul>
  {% for tag in tags %}
    <li>{{ tag.name }}</li>
  {% endfor %}
</ul>
{% endblock %}
