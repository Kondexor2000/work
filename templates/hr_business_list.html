{% extends "base.html" %}

{% block content %}
<h1>Businesses Managed</h1>
<ul>
  {% for business in products %}
    <li>{{ business.name }}</li>
    {% for hri in hr %}
      <a href="{% url 'read_offer_jobs' business_id=business.id hr_id=hri.id %}">
          <button type="button">Proponowane oferty pracy</button>
      </a>
    {% empty %}
      <li>No HR records found for this business.</li>
    {% endfor %}
  {% empty %}
    <li>No businesses found.</li>
  {% endfor %}
</ul>
{% endblock %}
