{% extends 'base.html' %}
{% block content %}
<h2>Dodaj pytania</h2>
<form method="post">
    {% csrf_token %}
    {{ formset.management_form }}
    <div id="formset">
        {% for form in formset %}
            <div class="question-form">
                {{ form.as_p }}
            </div>
        {% endfor %}
    </div>
    <button type="button" id="add-more">Dodaj kolejne pytanie</button>
    <button type="submit">Zapisz pytania</button>
</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let totalForms = document.getElementById('id_form-TOTAL_FORMS');
    let formContainer = document.getElementById('formset');
    let addButton = document.getElementById('add-more');

    addButton.addEventListener('click', function() {
        let formCount = parseInt(totalForms.value);
        let newForm = formContainer.children[0].cloneNode(true);
        newForm.querySelectorAll('input').forEach(function(input) {
            input.value = '';
        });
        newForm.querySelectorAll('textarea').forEach(function(textarea) {
            textarea.value = '';
        });
        newForm.querySelectorAll('[name]').forEach(function(element) {
            element.name = element.name.replace(/-\d+-/, '-' + formCount + '-');
        });
        newForm.querySelectorAll('[id]').forEach(function(element) {
            element.id = element.id.replace(/-\d+-/, '-' + formCount + '-');
        });
        formContainer.appendChild(newForm);
        totalForms.value = formCount + 1;
    });
});
</script>
{% endblock %}
