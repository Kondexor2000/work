{% extends "base.html" %}
{% block content %}
<h1>Your Job Offers</h1>
<div class="search-container">
<ul>
  {% for offer in products %}
    <li>{{ offer.title }} - {{ offer.business }} - {{ offer.category }}</li>
    <a href="{% url 'add_offer_jobs_user' offers_job_id=offer.id %}">Zaproś kandydatów</a>
  {% empty %}
    <li>No offers available.</li>
  {% endfor %}
</ul>
</div>
{% endblock %}
