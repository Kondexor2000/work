{% extends "base.html" %}
{% block content %}
<h1>Zarządzaj swoim portfolio</h1>
<ul>
  {% for item in products %}
    <li>{{ item.title }}</li>
    <a href="{% url 'portfolio_links_view' portfolio_id=item.id %}">Moje linki</a>
    <a href="{% url 'update_portfolio' portfolio_id=item.id %}">Edytuj portfolio</a>
  {% endfor %}
</ul>
{% endblock %}
