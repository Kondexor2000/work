{% extends "base.html" %}
{% block content %}
<h1>Szukaj CV</h1>
<form method="get">
  <input type="text" name="q" value="{{ query }}" placeholder="Search...">
  <button type="submit">Szukaj</button>
</form>
<h2>Wyniki wyszukiwania CV</h2>
<div class="search-container">
<ul>
  {% for item in cvs %}
    <li>
      {{ item.title }} - {{ item.user.username }}
      {% if item.user == request.user %}
        <a href="{% url 'cv_to_user_view' %}">
          <button type="button">CV</button>
        </a>
        <a href="{% url 'add_education' cv_id=item.id %}">
          <button type="button">Dodaj wykształcenie</button>
        </a>
        <a href="{% url 'add_skill' cv_id=item.id %}">
          <button type="button">Dodaj umiejętności</button>
        </a>
        <a href="{% url 'add_experience' cv_id=item.id %}">
          <button type="button">Dodaj doświadczenie</button>
        </a>
        <a href="{% url 'add_hobby' cv_id=item.id %}">
          <button type="button">Dodaj zainteresowania</button>
        </a>
      {% else %}
        <a href="{% url 'cv_to_id_view' cv_id=item.id %}">
          <button type="button">CV</button>
        </a>
        <a href="{% url 'cv_education_view' cv_id=item.id %}">
          <button type="button">Wykształcenie</button>
        </a>
        <a href="{% url 'cv_skills_view' cv_id=item.id %}">
          <button type="button">Umiejętności</button>
        </a>
        <a href="{% url 'cv_id_view' cv_id=item.id %}">
          <button type="button">Doświadczenie</button>
        </a>
        <a href="{% url 'cv_hobby_view' cv_id=item.id %}">
          <button type="button">Zainteresowania</button>
        </a>
      {% endif %}
    </li>
  {% endfor %}
</ul>
</div>
{% endblock %}
