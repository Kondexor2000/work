{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css?family=Roboto">
    <title>{% block title %}Eduwork{% endblock %}</title>
    <style>
        body {
            font-family: 'Roboto', light;
            text-align: center;
        }

        a {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        button {
            background: none;
            display: flex;
            justify-content: center; /* wyśrodkuj w poziomie */
            gap: 10px;
        }
    </style>
</head>
<body>
    <header>
        <img src="{% static 'eduwork.png' %}" width="500px" height="240px">
        <!-- Nawigacja itp. -->
    </header>

    <main>
        {% block content %}
        <!-- Zawartość stron dziedziczących -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 My Company</p>
    </footer>
</body>
</html>
