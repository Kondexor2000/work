{% extends "base.html" %}

{% block content %}
<h1>Businesses Managed: {{ business.name }}</h1>

<ul>
  {% for hr in hr_list %}
    <li>
      HR User: {{ hr.user.username }} - Email: {{ hr.user.email }}
      <a href="{% url 'read_offer_jobs' business_id=business.id hr_id=hr.id %}">
          <button type="button">Proponowane oferty pracy</button>
      </a>
    </li>
  {% empty %}
    <li>Brak HR powiązanych z tym biznesem.</li>
  {% endfor %}
</ul>
{% endblock %}
