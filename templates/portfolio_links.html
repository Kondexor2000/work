{% extends "base.html" %}
{% block content %}
<h1>Portfolio Links</h1>
<ul>
  {% for link in products %}
    <li><a href="{{ link.url }}">{{ link.url }}</a></li>
    <a href="{% url 'update_link' portfolio_id=link.portfolio.id link_id=link.id %}">
          <button type="button">Usuń link</button>
        </a>
  {% endfor %}
</ul>
{% endblock %}
